# Application name
spring.application.name=PocJwtAuth

# JWT Configuration
jwt.secret.key=my-super-secret-key-for-jwt-authentication-2024-spring-boot-with-64-bytes-or-more-xxxxxxxx
jwt.expiration.days=1

spring.datasource.url=jdbc:mysql://localhost/PocJwtAuth?createDatabaseIfNotExist=true&verifyServerCertificate=false&useSSL=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.datasource.username=joseph
spring.datasource.password=YeDDyp3G
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DDL Auto (create, update, validate, none, create-drop)
# create: Elimina y crea las tablas cada vez
# update: Actualiza el esquema sin eliminar datos
# validate: Solo valida que el esquema coincida
# none: No hace nada
spring.jpa.hibernate.ddl-auto=update

# SQL Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring Security
logging.level.org.springframework.security=DEBUG

# Application logging
logging.level.com.example.pocjwtauth=DEBUG

# Server configuration
server.port=8080
server.servlet.context-path=/